name: 'dhis2: verify (commits)'

on:
  pull_request:
    types: ['opened', 'edited', 'reopened', 'synchronize']

jobs:
  lint-pr-title:
    if: github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'dhis2-bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: 18.x
      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: |
            **/node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-node_modules-cypress-${{ hashFiles('**/yarn.lock') }}
      - name: Install safe-chain
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh | sh -s -- --ci
      - name: Install
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        env:
          SAFE_CHAIN_MINIMUM_PACKAGE_AGE_HOURS: 120
          SAFE_CHAIN_MINIMUM_PACKAGE_AGE_EXCLUSIONS: "@dhis2/*"
        run: yarn install --frozen-lockfile
      - id: commitlint
        run: echo ::set-output name=config_path::$(node -e "process.stdout.write(require('@dhis2/cli-style').config.commitlint)")
      - uses: JulienKode/pull-request-name-linter-action@v0.5.0
        with:
          configuration-path: ${{ steps.commitlint.outputs.config_path }}

  lint-commits:
    if: github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'dhis2-bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: 18.x
      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: |
            **/node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-node_modules-cypress-${{ hashFiles('**/yarn.lock') }}
      - name: Install safe-chain
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh | sh -s -- --ci
      - name: Install
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        env:
          SAFE_CHAIN_MINIMUM_PACKAGE_AGE_HOURS: 120
          SAFE_CHAIN_MINIMUM_PACKAGE_AGE_EXCLUSIONS: "@dhis2/*"
        run: yarn install --frozen-lockfile
      - id: commitlint
        run: echo ::set-output name=config_path::$(node -e "process.stdout.write(require('@dhis2/cli-style').config.commitlint)")
      - uses: wagoid/commitlint-github-action@v4
        with:
          configFile: ${{ steps.commitlint.outputs.config_path }}
